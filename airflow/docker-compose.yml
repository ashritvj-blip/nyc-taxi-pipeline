version: "3.8"
services:
  airflow:
    image: apache/airflow:2.8.0
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
    volumes:
      - ./dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
      - ../dbt_project:/opt/airflow/dbt_project
    ports:
      - "8080:8080"
    entrypoint: /bin/bash
    command: -c "airflow db init && airflow users create --username admin --password admin --firstname John --lastname Ashrit --role Admin --email vjashrit@gmail.com && airflow webserver & airflow scheduler"
