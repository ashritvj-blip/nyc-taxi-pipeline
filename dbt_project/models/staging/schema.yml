version: 2

models:
  - name: stg_taxi_trips
    description: "Cleaned and standardised NYC Yellow Taxi trips"
    columns:
      - name: pickup_datetime
        description: "When the trip started"
        tests:
          - not_null

      - name: pickup_location_id
        description: "Taxi zone where trip started"
        tests:
          - not_null

      - name: fare_amount
        description: "Base fare amount"
        tests:
          - not_null

      - name: trip_distance
        description: "Trip distance in miles"
        tests:
          - not_null

      - name: payment_type
        description: "Payment method code"
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5, 6]
